openapi: 3.1.0
info:
  title: Amend API
  version: 0.1.0-beta
  license:
    identifier: MIT
    name: MIT
  summary: Source-linked product updates, roadmap, feedback, and notification loop API.
  description: >
    Beta contract for the Convex HTTP routes served from /api/v1. Public customer-facing
    reads and feedback writes can be called without a token. Owner-level mutations require
    Authorization: Bearer <AMEND_API_TOKEN> when AMEND_API_TOKEN is configured.
servers:
  - url: /api/v1
    description: Same-origin hosted API
  - url: http://127.0.0.1:3211/api/v1
    description: Local Convex HTTP actions
tags:
  - name: Public
    description: Public portal, roadmap, changelog, and domain routing reads.
  - name: Customer
    description: Customer-facing identity, feedback, event, and notification preference routes.
  - name: Owner
    description: Workspace owner/admin routes guarded by the Amend API token when configured.
  - name: Webhooks
    description: Provider webhook ingestion routes with provider signature checks where configured.
  - name: System
    description: Self-host version and deployment metadata.
security:
  - AmendApiToken: []
paths:
  "/version":
    get:
      summary: Fetch deployed version metadata
      operationId: getVersion
      tags: [System]
      security: []
      responses:
        "200":
          description: Version metadata for the running Amend deployment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"
        "4XX":
          $ref: "#/components/responses/ClientError"
  "/{workspaceSlug}/portal":
    get:
      summary: Fetch public portal data
      operationId: getPortal
      tags: [Public]
      security: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
        - name: roadmapStatus
          in: query
          schema:
            $ref: "#/components/schemas/RoadmapStatus"
      responses:
        "200":
          description: Public portal data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
  "/{workspaceSlug}/roadmap":
    get:
      summary: Fetch public roadmap items
      operationId: getRoadmap
      tags: [Public]
      security: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RoadmapStatus"
      responses:
        "200":
          description: Roadmap items and a tracked roadmap view event.
          content:
            application/json:
              schema:
                type: object
                required: [roadmap]
                properties:
                  roadmap:
                    type: array
                    items:
                      $ref: "#/components/schemas/RoadmapItem"
        "4XX":
          $ref: "#/components/responses/ClientError"
    post:
      summary: Create or update a roadmap item
      operationId: upsertRoadmapItem
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoadmapItemInput"
      responses:
        "201":
          description: Created or updated roadmap item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoadmapItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/changelog":
    get:
      summary: Fetch public changelog entries
      operationId: getChangelog
      tags: [Public]
      security: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      responses:
        "200":
          description: Changelog entries and a tracked changelog view event.
          content:
            application/json:
              schema:
                type: object
                required: [changelog]
                properties:
                  changelog:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChangelogEntry"
        "4XX":
          $ref: "#/components/responses/ClientError"
    post:
      summary: Create or update a changelog entry
      operationId: upsertChangelogEntry
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangelogEntryInput"
      responses:
        "201":
          description: Created or updated changelog entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangelogEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/updates":
    get:
      summary: Fetch user-specific updates
      operationId: getUpdates
      tags: [Customer]
      security: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
        - name: externalUserId
          in: query
          schema:
            type: string
        - name: userId
          in: query
          deprecated: true
          schema:
            type: string
        - name: email
          in: query
          schema:
            type: string
            format: email
      responses:
        "200":
          description: User-filtered notifications plus public roadmap and changelog context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatesResponse"
        "4XX":
          $ref: "#/components/responses/ClientError"
  "/{workspaceSlug}/settings":
    get:
      summary: Fetch workspace settings
      operationId: getWorkspaceSettings
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      responses:
        "200":
          description: Workspace settings for owner/admin surfaces.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSettings"
        "4XX":
          $ref: "#/components/responses/ClientError"
  "/{workspaceSlug}/decisions":
    get:
      summary: Fetch automation decisions
      operationId: getAutomationDecisions
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      responses:
        "200":
          description: Source-linked proactive agent decisions.
          content:
            application/json:
              schema:
                type: object
                required: [decisions]
                properties:
                  decisions:
                    type: array
                    items:
                      $ref: "#/components/schemas/AutomationDecision"
        "4XX":
          $ref: "#/components/responses/ClientError"
  "/{workspaceSlug}/build-briefs":
    get:
      summary: Fetch agent-readable build briefs
      operationId: getBuildBriefs
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/BuildBriefStatus"
        - name: projectSlug
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Agent-readable build briefs for customer-demand driven implementation.
          content:
            application/json:
              schema:
                type: object
                required: [buildBriefs]
                properties:
                  buildBriefs:
                    type: array
                    items:
                      $ref: "#/components/schemas/BuildBrief"
        "4XX":
          $ref: "#/components/responses/ClientError"
  "/{workspaceSlug}/agent-runs":
    get:
      summary: Fetch proactive agent run history
      operationId: getAgentRuns
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
        - name: projectSlug
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Persisted proactive agent runs for audit and coding-agent context.
          content:
            application/json:
              schema:
                type: object
                required: [runs]
                properties:
                  runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentRun"
        "4XX":
          $ref: "#/components/responses/ClientError"
  "/{workspaceSlug}/deliveries":
    get:
      summary: Fetch delivery outbox records
      operationId: getDeliveryOutbox
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      responses:
        "200":
          description: Planned delivery outbox records.
          content:
            application/json:
              schema:
                type: object
                required: [deliveries]
                properties:
                  deliveries:
                    type: array
                    items:
                      $ref: "#/components/schemas/Delivery"
        "4XX":
          $ref: "#/components/responses/ClientError"
    post:
      summary: Plan or send delivery records
      operationId: planOrSendDeliveries
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/DeliveryPlanInput"
                - $ref: "#/components/schemas/DeliverySendInput"
      responses:
        "200":
          description: Delivery send result when action is send.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliverySendResult"
        "201":
          description: Planned delivery records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/github-app":
    get:
      summary: Fetch GitHub App install readiness
      operationId: getGitHubAppInstallInfo
      tags: [Owner]
      security: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      responses:
        "200":
          description: GitHub App installation readiness.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubAppInfo"
        "4XX":
          $ref: "#/components/responses/ClientError"
  "/{workspaceSlug}/projects":
    get:
      summary: List workspace projects
      operationId: listProjects
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      responses:
        "200":
          description: Workspace projects.
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
        "4XX":
          $ref: "#/components/responses/ClientError"
    post:
      summary: Create a workspace project
      operationId: createProject
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/plans":
    get:
      summary: Fetch plan catalog
      operationId: getPlanCatalog
      tags: [Owner]
      security: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      responses:
        "200":
          description: Plan catalog and current workspace plan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanCatalog"
        "4XX":
          $ref: "#/components/responses/ClientError"
    post:
      summary: Update workspace plan
      operationId: updatePlan
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanUpdateInput"
      responses:
        "200":
          description: Updated plan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "4XX":
          $ref: "#/components/responses/ClientError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/_/domains":
    get:
      summary: Resolve a custom domain
      operationId: resolveCustomDomain
      tags: [Public]
      security: []
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            type: string
        - name: purpose
          in: query
          schema:
            $ref: "#/components/schemas/DomainPurpose"
      responses:
        "200":
          description: Domain resolution result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResolution"
        "404":
          description: Domain was not resolved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResolution"
  "/{workspaceSlug}/identity":
    post:
      summary: Identify a customer user
      operationId: identifyUser
      tags: [Customer]
      security: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [identity]
                  properties:
                    identity:
                      $ref: "#/components/schemas/IdentityInput"
                - $ref: "#/components/schemas/IdentityInput"
      responses:
        "200":
          description: Mapped identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "4XX":
          $ref: "#/components/responses/ClientError"
  "/{workspaceSlug}/feedback":
    post:
      summary: Create customer feedback
      operationId: createFeedback
      tags: [Customer]
      security: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInput"
      responses:
        "201":
          description: Created feedback request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"
        "4XX":
          $ref: "#/components/responses/ClientError"
  "/{workspaceSlug}/interactions":
    post:
      summary: Record a feedback interaction
      operationId: recordFeedbackInteraction
      tags: [Customer]
      security: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInteractionInput"
      responses:
        "201":
          description: Recorded vote, comment, or reaction.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "4XX":
          $ref: "#/components/responses/ClientError"
  "/{workspaceSlug}/events":
    post:
      summary: Track a product-loop event
      operationId: trackEvent
      tags: [Customer]
      security: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Tracked event.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "4XX":
          $ref: "#/components/responses/ClientError"
  "/{workspaceSlug}/github":
    post:
      summary: Ingest a GitHub webhook
      operationId: ingestGitHubWebhook
      tags: [Webhooks]
      security: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
        - name: X-GitHub-Event
          in: header
          required: false
          schema:
            type: string
        - name: X-GitHub-Delivery
          in: header
          required: false
          schema:
            type: string
        - name: X-Hub-Signature-256
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubWebhookPayload"
      responses:
        "202":
          description: Ingested source event.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/source-events":
    get:
      summary: Fetch imported source events
      operationId: getSourceEvents
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
        - name: projectSlug
          in: query
          schema:
            type: string
        - name: provider
          in: query
          schema:
            $ref: "#/components/schemas/SourceProvider"
        - name: kind
          in: query
          schema:
            $ref: "#/components/schemas/SourceKind"
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Source evidence imported from GitHub, SDK/API, CLI, portal, and channel adapters.
          content:
            application/json:
              schema:
                type: object
                required: [sourceEvents]
                properties:
                  sourceEvents:
                    type: array
                    items:
                      $ref: "#/components/schemas/SourceEvent"
        "4XX":
          $ref: "#/components/responses/ClientError"
    post:
      summary: Import a source event
      operationId: importSourceEvent
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/SourceEventInput"
                - type: object
                  required: [sourceEvent]
                  properties:
                    sourceEvent:
                      $ref: "#/components/schemas/SourceEventInput"
      responses:
        "201":
          description: Imported or updated source evidence for the proactive agent loop.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceEventImportResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/stripe":
    post:
      summary: Ingest a Stripe webhook
      operationId: ingestStripeWebhook
      tags: [Webhooks]
      security: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
        - name: Stripe-Signature
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonObject"
      responses:
        "200":
          description: Processed Stripe event.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/drafts":
    post:
      summary: Draft changelog copy
      operationId: draftChangelog
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangelogDraftInput"
      responses:
        "201":
          description: Drafted changelog copy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangelogDraft"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/rules":
    post:
      summary: Update automation rules
      operationId: updateAutomationRules
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationRulesInput"
      responses:
        "200":
          description: Updated automation rules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/members":
    post:
      summary: Upsert a workspace member
      operationId: upsertWorkspaceMember
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceMemberInput"
      responses:
        "200":
          description: Upserted workspace member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/integrations":
    post:
      summary: Upsert an integration connection
      operationId: upsertIntegration
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationInput"
      responses:
        "200":
          description: Upserted integration connection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/portal-settings":
    post:
      summary: Update portal settings
      operationId: updatePortalSettings
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortalSettingsInput"
      responses:
        "200":
          description: Updated portal settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/repositories":
    post:
      summary: Connect a GitHub repository
      operationId: connectRepository
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepositoryInput"
      responses:
        "201":
          description: Connected repository.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/checkout":
    post:
      summary: Create a checkout session
      operationId: createCheckoutSession
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Dry-run checkout result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
        "201":
          description: Created Stripe checkout session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/preferences":
    post:
      summary: Set notification preferences
      operationId: setNotificationPreference
      tags: [Customer]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreferenceInput"
      responses:
        "200":
          description: Updated notification preference.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/{workspaceSlug}/domains":
    post:
      summary: Register or verify a custom domain
      operationId: registerOrVerifyCustomDomain
      tags: [Owner]
      parameters:
        - $ref: "#/components/parameters/WorkspaceSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/DomainRegistrationInput"
                - $ref: "#/components/schemas/DomainVerificationInput"
      responses:
        "200":
          description: Domain verification result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "201":
          description: Registered custom domain.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    AmendApiToken:
      type: http
      scheme: bearer
  parameters:
    WorkspaceSlug:
      name: workspaceSlug
      in: path
      required: true
      schema:
        type: string
      description: Public Amend workspace slug.
  responses:
    ClientError:
      description: Bad request, missing resource, invalid input, or another client-side failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid Amend API token or webhook signature.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    JsonValue:
      description: Any JSON-serializable metadata value.
    JsonObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    VersionInfo:
      type: object
      required: [apiVersion, name, source, updateCheck, updateCheckDisabled, version]
      properties:
        apiVersion:
          type: string
          description: Stable REST API version served by this deployment.
        buildTime:
          type: string
          description: Build timestamp when provided by AMEND_BUILD_TIME.
