          type: object
          required: [enabled, privacy, releaseUrl]
          properties:
            enabled:
              type: boolean
            privacy:
              type: string
            releaseUrl:
              type: string
              description: Public release metadata URL used by explicit CLI update checks.
        updateCheckDisabled:
          type: boolean
          description: True when AMEND_DISABLE_VERSION_CHECK=1 is set for the deployment.
        version:
          type: string
          description: Release tag or application version from AMEND_VERSION.
